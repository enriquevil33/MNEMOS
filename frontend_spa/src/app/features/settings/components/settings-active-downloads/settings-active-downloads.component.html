<div class="bg-panel border border-divider rounded-xl p-4 sm:p-6 animation-fade-in mb-6">
    <h2 class="text-lg font-semibold mb-4">Active Downloads</h2>
    <div class="space-y-4">
        @for (download of downloads(); track download.task_id) {
        <div class="flex items-center gap-3">
            <div class="flex-1">
                <app-progress-bar [label]="download.model || download.model_name"
                    [progress]="download.progress !== undefined ? download.progress : ((download.total && download.completed) ? (download.completed / download.total * 100) : 0)"
                    [status]="download.status === 'success' ? 'completed' : (download.status === 'failure' ? 'error' : (download.status === 'revoked' ? 'error' : 'downloading'))"
                    [message]="download.status">
                </app-progress-bar>
            </div>
            <button (click)="handleDeletePull(download.task_id)" title="Cancel/Clear Download"
                class="btn-icon text-secondary hover:text-error hover:bg-error hover:bg-opacity-10 p-2 rounded-lg transition-colors mt-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
        }
    </div>
</div>
