<!-- Initial Loader -->
<app-fullscreen-modal [isLoading]="isInitialLoading()"></app-fullscreen-modal>

<div class="flex h-screen overflow-hidden bg-base text-primary font-sans antialiased">

    <!-- Sidebar (Desktop) -->
    <aside
        class="hidden lg:flex flex-col w-64 bg-sidebar border-r border-divider flex-shrink-0 transition-all duration-300">
        <!-- Sidebar Content (Reused) -->
        <app-sidebar [isSidebarOpen]="isSidebarOpen" [theme]="themeService.theme"></app-sidebar>
    </aside>

    <!-- Sidebar (Mobile - Fullscreen Modal) -->
    @if (isSidebarOpen()) {
    <div class="fixed inset-0 z-50 lg:hidden">
        <!-- Backdrop (Optional for fullscreen, but good for transition) -->
        <div class="absolute inset-0 bg-base transition-opacity"></div>

        <!-- Sidebar Panel (Fullscreen) -->
        <aside class="absolute inset-0 w-full h-full bg-sidebar flex flex-col anime-slide-in">
            <app-sidebar [isSidebarOpen]="isSidebarOpen" [theme]="themeService.theme"></app-sidebar>
        </aside>
    </div>
    }

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-base relative w-full h-full overflow-hidden">
        <!-- Mobile Header -->
        <div class="lg:hidden flex items-center justify-between p-4 border-b border-divider bg-sidebar">
            <div class="flex items-center gap-2">
                <button (click)="toggleTheme()" title="Toggle theme"
                    class="w-5 h-5 rounded-full hover:scale-110 transition-transform animate-pulse-subtle flex-shrink-0">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="4"
                            class="text-secondary" />
                        <path d="M50,4 A46,46 0 0,0 50,96 A23,23 0 0,1 50,50 A23,23 0 0,0 50,4 Z" fill="currentColor"
                            class="text-primary" />
                        <path d="M50,4 A46,46 0 0,1 50,96 A23,23 0 0,0 50,50 A23,23 0 0,1 50,4 Z" fill="currentColor"
                            class="text-sidebar" />
                        <circle cx="50" cy="73" r="7" fill="currentColor" class="text-primary" />
                        <circle cx="50" cy="27" r="7" fill="currentColor" class="text-sidebar" />
                    </svg>
                </button>
                <h1 class="text-lg font-bold text-primary font-brand">MNEMOS</h1>
            </div>
            <button (click)="toggleSidebar()" class="p-2 -mr-2 text-secondary hover:text-primary">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <!-- Router Outlet -->
        <div class="flex-1 overflow-hidden relative">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>

<app-upload-modal></app-upload-modal>

<!-- PDF Viewer Modal -->
<app-pdf-viewer [theme]="themeService.theme()"></app-pdf-viewer>
<!-- Youtube Viewer Modal -->
<app-youtube-viewer></app-youtube-viewer>
<!-- Video Player Modal -->
<app-video-player></app-video-player>
