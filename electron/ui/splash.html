<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MNEMOS Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .splash-container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      padding: 40px;
      width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status-message {
      font-size: 16px;
      margin-bottom: 20px;
      min-height: 24px;
      opacity: 0.95;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .progress-bar {
      height: 100%;
      background: white;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      margin: 20px auto;
    }

    .spinner div {
      box-sizing: border-box;
      display: block;
      position: absolute;
      width: 32px;
      height: 32px;
      margin: 4px;
      border: 3px solid #fff;
      border-radius: 50%;
      animation: spinner 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      border-color: #fff transparent transparent transparent;
    }

    .spinner div:nth-child(1) {
      animation-delay: -0.45s;
    }

    .spinner div:nth-child(2) {
      animation-delay: -0.3s;
    }

    .spinner div:nth-child(3) {
      animation-delay: -0.15s;
    }

    @keyframes spinner {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .version {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 20px;
    }

    .error-message {
      color: #ffebee;
      background: rgba(244, 67, 54, 0.2);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo">MNEMOS</div>
    <div class="subtitle">AI-Powered Context & Memory</div>

    <div class="status-message" id="status">Initializing...</div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div class="spinner">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div class="error-message" id="error"></div>

    <div class="version">Version 1.0.0</div>
  </div>

  <script>
    // Listen for status updates from main process
    if (window.electronAPI && window.electronAPI.onStatusUpdate) {
      window.electronAPI.onStatusUpdate((data) => {
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const errorEl = document.getElementById('error');

        if (data.message) {
          statusEl.textContent = data.message;
        }

        if (typeof data.progress === 'number') {
          progressEl.style.width = `${data.progress}%`;
        }

        if (data.error) {
          errorEl.textContent = data.error;
          errorEl.classList.add('show');
        }
      });
    }
  </script>
</body>
</html>
