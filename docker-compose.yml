services:
  frontend:
    build: ./frontend_spa
    ports:
      - "5200:80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://mnemos_user:mnemos_pass@db:5432/mnemos_db
      - REDIS_URL=redis://redis:6379/0
      # Ensure python doesn't buffer output so we see logs in realtime
      - PYTHONUNBUFFERED=1
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_DEVICE=cuda
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIMENSION=1024
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH:-.}
    volumes:
      - ./app:/app/app:rw
      - ./config:/app/config:rw
      - ./.env:/app/.env:ro
      - ./migrations:/app/migrations:rw
      - ./models:/app/models:ro
      - uploads_data:/app/uploads
      - whisper_cache:/root/.cache/whisper
      - hf_cache:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    extra_hosts:
      - "host.docker.internal:host-gateway" # For LM Studio access

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --pool=solo
    environment:
      - DATABASE_URL=postgresql://mnemos_user:mnemos_pass@db:5432/mnemos_db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_DEVICE=cuda
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIMENSION=1024
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH:-.}
    volumes:
      - ./app:/app/app:rw
      - ./config:/app/config:rw
      - ./.env:/app/.env:ro
      - uploads_data:/app/uploads
      - whisper_cache:/root/.cache/whisper
      - hf_cache:/root/.cache/huggingface
      - ./models:/app/models:rw
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  llamacpp:
    # Rolling release - pulls latest version
    # Run 'docker compose pull llamacpp' to get updates
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    pull_policy: always
    profiles: ["llamacpp"]  # Only starts when model exists
    ports:
      - "8082:8080"
    environment:
      - LLAMACPP_NUM_CTX=${LLAMACPP_NUM_CTX:-16384}
    volumes:
      - ./models:/models
    command: >
      --port 8080
      --host 0.0.0.0
      -m ${LLAMACPP_MODEL_PATH:-/models/Hermes-3-Llama-3.2-3B.Q4_K_M.gguf}
      -ngl 999
      -c 16384
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  mcp:
    build: .
    # Keep container running - MCP will be accessed via stdio (docker exec)
    # OpenCode will call: docker exec -i dev-mcp-1 python -m app.mcp_server.server
    command: tail -f /dev/null
    environment:
      - DATABASE_URL=postgresql://mnemos_user:mnemos_pass@db:5432/mnemos_db
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:rw
      - ./config:/app/config:rw

  db:
    image: pgvector/pgvector:pg16
    # Optimization: Tune Postgres for Vector Search
    # shared_buffers: ~25% of RAM (128MB is conservative default, setting 512MB)
    # work_mem: Memory for complex sorts/queries (vector search needs this)
    # maintenance_work_mem: Speed up index creation (HNSW build)
    command: >
      postgres  -c shared_buffers=512MB  -c work_mem=32MB  -c maintenance_work_mem=256MB
    environment:
      - POSTGRES_USER=mnemos_user
      - POSTGRES_PASSWORD=mnemos_pass
      - POSTGRES_DB=mnemos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mnemos_user -d mnemos_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Optimization: Enable AOF (Append Only File) persistence
    # This prevents data loss (like Celery tasks) if the container restarts.
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
  whisper_cache:
  redis_data:
  hf_cache:
